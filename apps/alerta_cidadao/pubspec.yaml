name: alerta_cidadao
description: Plataforma de Defesa Civil — App Cidadão e Agente
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ==========================================
  # STATE MANAGEMENT
  # ==========================================
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ==========================================
  # NAVIGATION
  # ==========================================
  go_router: ^14.2.0

  # ==========================================
  # HTTP & API
  # ==========================================
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # ==========================================
  # OFFLINE STORAGE
  # ==========================================
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # ==========================================
  # AUTH
  # ==========================================
  flutter_secure_storage: ^9.0.0
  google_sign_in: ^6.2.1

  # ==========================================
  # LOCATION & MAPS
  # ==========================================
  geolocator: ^13.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geocoding: ^3.0.0

  # ==========================================
  # CAMERA & MEDIA
  # ==========================================
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  flutter_image_compress: ^2.2.0

  # ==========================================
  # NOTIFICATIONS
  # ==========================================
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.2
  flutter_local_notifications: ^17.1.2

  # ==========================================
  # CONNECTIVITY
  # ==========================================
  connectivity_plus: ^6.0.3

  # ==========================================
  # UI
  # ==========================================
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_svg: ^2.0.10+1
  gap: ^3.0.1
  intl: ^0.19.0
  timeago: ^3.6.1

  # ==========================================
  # UTILITIES
  # ==========================================
  uuid: ^4.4.0
  collection: ^1.18.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0
  mocktail: ^1.0.4
  fake_async: ^1.3.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: IBMPlexSans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Regular.ttf
        - asset: assets/fonts/IBMPlexSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSans-Bold.ttf
          weight: 700
    - family: IBMPlexMono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500
