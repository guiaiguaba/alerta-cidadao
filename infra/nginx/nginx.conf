# infra/nginx/nginx.conf
# Roteamento por subdomínio para multi-tenant

events {
  worker_connections 1024;
}

http {
  # Upstream servers
  upstream api_backend {
    server api:3000;
    keepalive 32;
  }

  upstream web_backend {
    server web:3001;
    keepalive 16;
  }

  # Configurações gerais
  gzip on;
  gzip_types text/plain application/json application/javascript text/css;
  gzip_min_length 1024;

  client_max_body_size 20M;  # Para upload de fotos

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/s;

  # ==========================================
  # API — api.alertacidadao.com ou localhost:80/api
  # ==========================================
  server {
    listen 80;
    server_name api.alertacidadao.com localhost;

    location /api/ {
      limit_req zone=api_limit burst=50 nodelay;

      proxy_pass http://api_backend/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
      proxy_pass http://api_backend/ws;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 86400;
    }

    location /uploads/ {
      limit_req zone=upload_limit burst=10;
      proxy_pass http://api_backend/uploads/;
    }
  }

  # ==========================================
  # WILDCARD SUBDOMÍNIO — {tenant}.alertacidadao.com
  # Encaminha para o painel admin web + injeta X-Tenant-Slug
  # ==========================================
  server {
    listen 80;
    server_name ~^(?<tenant>[^.]+)\.alertacidadao\.com$;

    # Passar slug do subdomínio para o API via header
    proxy_set_header X-Tenant-Slug $tenant;

    location /api/ {
      limit_req zone=api_limit burst=50 nodelay;
      proxy_pass http://api_backend/api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Tenant-Slug $tenant;
    }

    location / {
      proxy_pass http://web_backend/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Tenant-Slug $tenant;
    }
  }

  # ==========================================
  # HEALTH CHECK
  # ==========================================
  server {
    listen 80;
    server_name health.alertacidadao.com;
    location / {
      return 200 'OK';
      add_header Content-Type text/plain;
    }
  }
}
