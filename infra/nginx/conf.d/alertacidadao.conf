# ─────────────────────────────────────────────────────────────
# API — api.alertacidadao.com.br (e subdomínios de tenant)
# ─────────────────────────────────────────────────────────────
upstream api_upstream {
    server api:3001;
    keepalive 32;
}

upstream web_upstream {
    server web:3000;
    keepalive 16;
}

upstream minio_upstream {
    server minio:9000;
}

# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name _;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── API backend ───────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.alertacidadao.com.br;

    ssl_certificate     /etc/letsencrypt/live/alertacidadao.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alertacidadao.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    location /auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location / {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
}

# ─── Web Admin (Next.js) ───────────────────────────────────────
# Captura qualquer subdomínio *.alertacidadao.com.br
server {
    listen 443 ssl http2;
    server_name ~^(?<tenant>[a-z0-9-]+)\.alertacidadao\.com\.br$;

    ssl_certificate     /etc/letsencrypt/live/alertacidadao.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alertacidadao.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://web_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── MinIO Storage ────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name storage.alertacidadao.com.br;

    ssl_certificate     /etc/letsencrypt/live/alertacidadao.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alertacidadao.com.br/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://minio_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
