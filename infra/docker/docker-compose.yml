version: '3.9'

services:
  # ==========================================
  # BANCO DE DADOS — PostGIS para queries geo
  # ==========================================
  postgres:
    image: postgis/postgis:16-3.4
    container_name: alerta_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: alerta_cidadao
      POSTGRES_USER: alerta
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alerta -d alerta_cidadao"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # REDIS — Cache + Rate Limiting + Pub/Sub
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: alerta_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ==========================================
  # S3-COMPATIBLE STORAGE (desenvolvimento)
  # ==========================================
  minio:
    image: minio/minio:latest
    container_name: alerta_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ==========================================
  # API — NestJS
  # ==========================================
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: alerta_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://alerta:${DB_PASSWORD:-dev_password}@postgres:5432/alerta_cidadao
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_32_chars_minimum}
      JWT_EXPIRY: 15m
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: alerta-cidadao-media
      S3_ACCESS_KEY: ${MINIO_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_PASSWORD:-minioadmin123}
      APP_DOMAIN: localhost
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./apps/api/src:/app/src    # Hot reload em desenvolvimento
    command: npm run start:dev

  # ==========================================
  # PAINEL ADMIN — Next.js
  # ==========================================
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: alerta_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:3000/ws
    ports:
      - "3001:3001"
    volumes:
      - ./apps/web/src:/app/src

  # ==========================================
  # NGINX — Reverse proxy + subdomínio routing
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: alerta_nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"

volumes:
  pgdata:
  redisdata:
  miniodata:

networks:
  default:
    name: alerta_network
