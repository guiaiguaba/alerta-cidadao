name: alerta_cidadao
description: Alerta Cidadão — App móvel para ocorrências municipais
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  firebase_messaging: ^14.7.0
  google_sign_in: ^6.2.0

  shared_preferences: ^2.3.5 # Ou a versão mais atual

  # HTTP
  dio: ^5.4.0

  # Estado
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Armazenamento local (offline-first)
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Geolocalização
  geolocator: ^11.0.0

  # Câmera / Imagens
  image_picker: ^1.0.7
  permission_handler: ^11.3.0

  # Mapas
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # UI
  cached_network_image: ^3.3.0
  flutter_spinkit: ^5.2.0
  gap: ^3.0.1

  # Utilitários
  uuid: ^4.3.0
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  path_provider: ^2.1.2
  go_router: ^17.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
