name: API — CI/CD

on:
  push:
    paths:
      - 'apps/api/**'
      - 'packages/shared-types/**'
    branches: [main, develop]
  pull_request:
    paths:
      - 'apps/api/**'

jobs:
  # ==========================================
  # TESTES
  # ==========================================
  test:
    name: Testes + Cobertura
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: alerta_test
          POSTGRES_USER: alerta
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Instalar dependências
        working-directory: apps/api
        run: npm ci

      - name: Gerar Prisma Client
        working-directory: apps/api
        run: npx prisma generate

      - name: Executar migrations (schema de teste)
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://alerta:test_password@localhost:5432/alerta_test
        run: npx prisma migrate deploy

      - name: Rodar testes unitários
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://alerta:test_password@localhost:5432/alerta_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_jwt_secret_at_least_32_chars
          NODE_ENV: test
        run: npm run test:cov

      - name: Upload de cobertura
        uses: codecov/codecov-action@v3
        with:
          directory: apps/api/coverage
          flags: api

      - name: Verificar cobertura mínima (70%)
        working-directory: apps/api
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          echo "Cobertura: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "❌ Cobertura abaixo de 70%"
            exit 1
          fi

  # ==========================================
  # BUILD E DEPLOY (apenas main)
  # ==========================================
  deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build e Push imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/alerta-api:latest
            ${{ secrets.REGISTRY_URL }}/alerta-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy para staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/alerta-cidadao
            docker compose pull api
            docker compose up -d api
            docker compose exec api npx prisma migrate deploy
            echo "✅ Deploy concluído: ${{ github.sha }}"

      - name: Notificar Slack
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "Deploy API — ${{ job.status }}"
          SLACK_MESSAGE: "Commit: ${{ github.sha }}"
