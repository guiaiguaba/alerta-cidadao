name: Web (Next.js) — CI/CD

on:
  push:
    paths:
      - 'apps/web/**'
      - 'packages/**'
    branches: [main, develop]
  pull_request:
    paths:
      - 'apps/web/**'

env:
  REGISTRY:      ghcr.io
  IMAGE_NAME:    ${{ github.repository }}/web

jobs:
  # ==========================================
  # LINT + TYPECHECK + BUILD
  # ==========================================
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Instalar dependências
        working-directory: apps/web
        run: npm ci

      - name: Type check (tsc)
        working-directory: apps/web
        run: npx tsc --noEmit

      - name: Lint (ESLint)
        working-directory: apps/web
        run: npm run lint

      - name: Build Next.js
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL:  https://api.alertacidadao.com/api/v1
          NEXT_PUBLIC_WS_URL:   wss://api.alertacidadao.com/ws
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/.next
          retention-days: 3

  # ==========================================
  # TESTES (unitários + componentes)
  # ==========================================
  test:
    name: Testes
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Instalar dependências
        working-directory: apps/web
        run: npm ci

      - name: Rodar testes com cobertura
        working-directory: apps/web
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run test:cov

      - name: Upload cobertura
        uses: codecov/codecov-action@v3
        with:
          directory: apps/web/coverage
          flags:     web

  # ==========================================
  # DEPLOY (apenas main)
  # ==========================================
  deploy:
    name: Deploy para Vercel / Cloud Run
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      # Opção A: Deploy via Vercel CLI
      - name: Deploy Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:   ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:  ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/web
          vercel-args:    '--prod'
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_WS_URL:  ${{ secrets.NEXT_PUBLIC_WS_URL }}

      # Opção B (alternativa): Docker + Cloud Run
      # - name: Build Docker image
      #   run: |
      #     docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} apps/web
      # - name: Push e deploy Cloud Run
      #   run: |
      #     docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
      #     gcloud run deploy web --image ...

      - name: Notificar deploy
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE:   "Deploy Web — ${{ job.status }}"
          SLACK_MESSAGE: "${{ github.sha }}"
          SLACK_COLOR:   ${{ job.status == 'success' && 'good' || 'danger' }}
