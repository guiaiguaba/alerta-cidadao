name: Mobile (Flutter) — CI/CD

on:
  push:
    paths:
      - 'apps/mobile/**'
    branches: [main, develop]
  pull_request:
    paths:
      - 'apps/mobile/**'

env:
  FLUTTER_VERSION: '3.41.9'
  JAVA_VERSION:    '17'

jobs:
  # ==========================================
  # ANÁLISE ESTÁTICA + TESTES UNITÁRIOS
  # ==========================================
  analyze:
    name: Análise & Testes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Verificar versão Flutter
        run: flutter --version

      - name: Instalar dependências
        working-directory: apps/mobile
        run: flutter pub get

      - name: Gerar código (build_runner)
        working-directory: apps/mobile
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Análise estática (dart analyze)
        working-directory: apps/mobile
        run: flutter analyze --no-fatal-infos

      - name: Verificar formatação
        working-directory: apps/mobile
        run: dart format --output=none --set-exit-if-changed lib/

      - name: Testes unitários com cobertura
        working-directory: apps/mobile
        run: flutter test --coverage

      - name: Upload cobertura
        uses: codecov/codecov-action@v3
        with:
          file:  apps/mobile/coverage/lcov.info
          flags: mobile

  # ==========================================
  # BUILD ANDROID
  # ==========================================
  build-android:
    name: Build Android (APK)
    runs-on: ubuntu-latest
    needs: analyze
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Instalar dependências
        working-directory: apps/mobile
        run: flutter pub get

      - name: Gerar código
        working-directory: apps/mobile
        run: dart run build_runner build --delete-conflicting-outputs

      # ==========================================
      # Build do app CIDADÃO (flavor citizen)
      # ==========================================
      - name: Build APK Cidadão (debug para PR / release para main)
        working-directory: apps/mobile
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            flutter build apk --flavor citizen --target lib/main_citizen.dart --release
          else
            flutter build apk --flavor citizen --target lib/main_citizen.dart --debug
          fi

      - name: Upload APK Cidadão
        uses: actions/upload-artifact@v4
        with:
          name: apk-citizen-${{ github.sha }}
          path: apps/mobile/build/app/outputs/flutter-apk/app-citizen-*.apk
          retention-days: 14

      # ==========================================
      # Build do app AGENTE (flavor agent)
      # ==========================================
      - name: Build APK Agente
        working-directory: apps/mobile
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            flutter build apk --flavor agent --target lib/main_agent.dart --release
          else
            flutter build apk --flavor agent --target lib/main_agent.dart --debug
          fi

      - name: Upload APK Agente
        uses: actions/upload-artifact@v4
        with:
          name: apk-agent-${{ github.sha }}
          path: apps/mobile/build/app/outputs/flutter-apk/app-agent-*.apk
          retention-days: 14

      # Assinar APK para release (apenas main)
      - name: Assinar APKs (main apenas)
        if: github.ref == 'refs/heads/main'
        working-directory: apps/mobile/build/app/outputs/flutter-apk
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_ALIAS:       ${{ secrets.ANDROID_KEY_ALIAS }}
          KEYSTORE_PWD:    ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PWD:         ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
          for apk in app-*-release.apk; do
            jarsigner -verbose \
              -sigalg SHA256withRSA \
              -digestalg SHA-256 \
              -keystore keystore.jks \
              -storepass "$KEYSTORE_PWD" \
              -keypass "$KEY_PWD" \
              "$apk" "$KEY_ALIAS"
          done
          rm keystore.jks

  # ==========================================
  # BUILD iOS (apenas macOS runner)
  # ==========================================
  build-ios:
    name: Build iOS (IPA)
    runs-on: macos-latest
    needs: analyze
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Instalar dependências
        working-directory: apps/mobile
        run: flutter pub get

      - name: Gerar código
        working-directory: apps/mobile
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS (sem codesign para CI)
        working-directory: apps/mobile
        run: |
          flutter build ios \
            --flavor citizen \
            --target lib/main_citizen.dart \
            --release \
            --no-codesign

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: ios-citizen-${{ github.sha }}
          path: apps/mobile/build/ios/iphoneos/Runner.app
          retention-days: 7

  # ==========================================
  # DISTRIBUIÇÃO (Firebase App Distribution)
  # ==========================================
  distribute:
    name: Distribuir para testers (Firebase)
    runs-on: ubuntu-latest
    needs: build-android
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          pattern: apk-*-${{ github.sha }}
          merge-multiple: true
          path: ./apks

      - name: Upload Cidadão para Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId:       ${{ secrets.FIREBASE_APP_ID_CITIZEN_ANDROID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups:      testers
          file:        ./apks/app-citizen-release.apk
          releaseNotes: "Build ${{ github.sha }} — ${{ github.event.head_commit.message }}"

      - name: Upload Agente para Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId:       ${{ secrets.FIREBASE_APP_ID_AGENT_ANDROID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups:      agents-testers
          file:        ./apks/app-agent-release.apk
          releaseNotes: "Build ${{ github.sha }}"

      - name: Notificar time
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE:   "📱 APKs distribuídos — ${{ job.status }}"
          SLACK_MESSAGE: "Commit: ${{ github.sha }}\n${{ github.event.head_commit.message }}"
          SLACK_COLOR:   ${{ job.status == 'success' && 'good' || 'danger' }}
